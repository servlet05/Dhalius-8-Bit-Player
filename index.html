<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Dhalius · 8-Bit Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f3f0;
            font-family: 'Courier New', Courier, monospace;
            color: #222;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 1100px;
            width: 100%;
        }

        /* HEADER 8-BIT */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 16px 0 12px;
            border-bottom: 4px solid #222;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #111;
            text-shadow: 4px 4px 0 #ddd;
        }

        .header .count {
            font-size: 0.9rem;
            background: #222;
            color: #fff;
            padding: 4px 14px;
            letter-spacing: 1px;
        }

        /* PLAYER BAR (minimal 8-bit) */
        .player-bar {
            background: #fff;
            border: 4px solid #222;
            padding: 14px 18px;
            margin-bottom: 24px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            box-shadow: 8px 8px 0 #ddd;
        }

        .player-bar .track-info {
            flex: 2;
            min-width: 120px;
        }

        .player-bar .track-info .name {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .player-bar .track-info .meta {
            font-size: 0.8rem;
            color: #777;
        }

        .player-bar .controls {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .player-bar .controls button {
            background: #fff;
            border: 3px solid #222;
            padding: 6px 14px;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.05s linear;
            color: #222;
            min-width: 44px;
        }

        .player-bar .controls button:hover {
            background: #222;
            color: #fff;
        }

        .player-bar .controls button:active {
            transform: scale(0.94);
        }

        .player-bar .controls button.primary {
            background: #222;
            color: #fff;
            padding: 6px 22px;
        }

        .player-bar .controls button.primary:hover {
            background: #444;
        }

        .player-bar .time {
            font-size: 0.8rem;
            font-variant-numeric: tabular-nums;
            min-width: 70px;
            text-align: center;
            color: #555;
        }

        .player-bar .progress {
            width: 100%;
            height: 8px;
            background: #eee;
            border: 2px solid #222;
            cursor: pointer;
            position: relative;
        }

        .player-bar .progress .fill {
            height: 100%;
            width: 0%;
            background: #222;
            transition: width 0.05s linear;
        }

        /* TRACK GRID — 8-bit minimalist */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 8px;
        }

        .track-card {
            background: #fff;
            border: 3px solid #222;
            padding: 12px 10px;
            cursor: pointer;
            transition: 0.05s linear;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 4px 0 #ddd;
        }

        .track-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 #ccc;
        }

        .track-card .tname {
            font-weight: 700;
            font-size: 0.8rem;
            line-height: 1.2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-card .tgenre {
            font-size: 0.65rem;
            color: #888;
            margin-top: 2px;
        }

        .track-card .tplay {
            margin-top: 8px;
            background: #fff;
            border: 2px solid #222;
            padding: 2px 0;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.05s;
            color: #222;
            width: 100%;
        }

        .track-card .tplay:hover {
            background: #222;
            color: #fff;
        }

        .track-card .tplay.playing {
            background: #222;
            color: #fff;
        }

        .track-card.active {
            background: #eee;
            border-color: #000;
        }

        /* scroll */
        .grid-wrap {
            max-height: 520px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .grid-wrap::-webkit-scrollbar {
            width: 8px;
        }
        .grid-wrap::-webkit-scrollbar-track {
            background: #f5f3f0;
        }
        .grid-wrap::-webkit-scrollbar-thumb {
            background: #222;
            border: 2px solid #f5f3f0;
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.4rem;
                letter-spacing: 2px;
            }
            .player-bar {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
            }
            .player-bar .controls {
                justify-content: center;
            }
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }
        }

        /* SPLASH */
        #splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f5f3f0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease;
        }
        #splash.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #splash h1 {
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: 8px;
            text-shadow: 8px 8px 0 #ddd;
            color: #222;
        }
        #splash p {
            font-size: 0.9rem;
            color: #888;
            letter-spacing: 4px;
            margin-top: 10px;
        }
        #splash .loader {
            margin-top: 30px;
            width: 24px;
            height: 24px;
            border: 4px solid #222;
            border-top: 4px solid #f5f3f0;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

        { name: 'Walking at South Jefferson ST', genre: 'Electronica', mood: 'Background', url: 'https://archive.org/download/FREE_background_music_dhalius/Walking%20at%20South%20Jefferson%20ST.mp3' },
        { name: 'Wave back the evening', genre: 'Electronica', mood: 'Background', url: 'https://archive.org/download/FREE_background_music_dhalius/WaveBackTheEvening.mp3' },
        { name: 'Ways', genre: 'Electronica', mood: 'Techno', url: 'https://archive.org/download/FREE_background_music_dhalius/Ways.mp3' },
        { name: 'WONDERFUL LIGHTS', genre: 'Electronica', mood: 'Orchestral', url: 'https://archive.org/download/FREE_background_music_dhalius/WonderfulLights.mp3' },
        { name: 'background image', genre: 'Electronica', mood: 'Background', url: 'https://archive.org/download/FREE_background_music_dhalius/background%20image.mp3' },
        { name: 'backsound', genre: 'Electronica', mood: 'Background', url: 'https://archive.org/download/FREE_background_music_dhalius/backsound.mp3' },
        { name: 'big ben', genre: 'Electronica', mood: 'Background', url: 'https://archive.org/download/FREE_background_music_dhalius/big%20ben.mp3' },
        { name: 'google maps', genre: 'Electronica', mood: 'Industrial', url: 'https://archive.org/download/FREE_background_music_dhalius/google%20maps.mp3' },
        { name: 'listening to photos', genre: 'Electronica', mood: 'Piano', url: 'https://archive.org/download/FREE_background_music_dhalius/listening%20to%20photos.mp3' },
        { name: 'remember the old days', genre: 'Electronica', mood: 'Background', url: 'https://archive.org/download/FREE_background_music_dhalius/remember%20the%20old%20days.mp3' },
        // Adding more to reach ~160 (the full 800+ would be too long for chat, but the logic works)
        // You can paste your full 800+ list here in the same format.
        // For brevity, I'll loop to create 800 entries using the existing data.
    ];

    // Expand to 800+ by duplicating with variations (for demo)
    // In production, replace this with your actual 800+ list.
    const tracks = [];
    for (let i = 0; i < 6; i++) {
        rawTracks.forEach(t => {
            tracks.push({
                name: i === 0 ? t.name : `${t.name} (v${i})`,
                genre: t.genre,
                mood: t.mood,
                url: t.url
            });
        });
    }
    // Now we have ~500+ tracks. For 800, add one more loop.
    // Limit to 100 for performance in this demo, but you can remove the line below.
    // tracks.splice(100);

    // ============================================================
    // 2. PLAYER ENGINE
    // ============================================================
    let currentIndex = 0;
    let audio = null;
    let isPlaying = false;
    let isDragging = false;
    let shuffle = false;

    const nowTitle = document.getElementById('nowTitle');
    const nowMeta = document.getElementById('nowMeta');
    const playBtn = document.getElementById('playBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const progressFill = document.getElementById('progressFill');
    const progressTrack = document.getElementById('progressTrack');
    const timeDisplay = document.getElementById('timeDisplay');
    const trackCount = document.getElementById('trackCount');
    const grid = document.getElementById('trackGrid');

    function formatTime(seconds) {
        if (isNaN(seconds) || seconds < 0) return '0:00';
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
    }

    function loadTrack(index) {
        if (index < 0 || index >= tracks.length) return;
        currentIndex = index;
        const track = tracks[index];

        if (audio) {
            audio.pause();
            audio = null;
        }

        audio = new Audio(track.url);
        audio.addEventListener('timeupdate', updateProgress);
        audio.addEventListener('ended', () => { nextTrack(); });

        nowTitle.textContent = track.name;
        nowMeta.textContent = `${track.genre} · ${track.mood}`;
        progressFill.style.width = '0%';
        timeDisplay.textContent = `0:00 / ${formatTime(audio.duration || 0)}`;
        isPlaying = false;
        playBtn.textContent = '▶';
        updateUI();
    }

    function togglePlay() {
        if (!audio) {
            loadTrack(currentIndex);
            setTimeout(() => togglePlay(), 200);
            return;
        }
        if (isPlaying) {
            audio.pause();
            isPlaying = false;
            playBtn.textContent = '▶';
        } else {
            audio.play().catch(() => {});
            isPlaying = true;
            playBtn.textContent = '⏸';
        }
        updateUI();
    }

    function prevTrack() {
        const newIndex = shuffle ? Math.floor(Math.random() * tracks.length) : (currentIndex - 1 + tracks.length) % tracks.length;
        loadTrack(newIndex);
        if (isPlaying) { audio?.play().catch(() => {}); }
    }

    function nextTrack() {
        const newIndex = shuffle ? Math.floor(Math.random() * tracks.length) : (currentIndex + 1) % tracks.length;
        loadTrack(newIndex);
        if (isPlaying) { audio?.play().catch(() => {}); }
    }

    function updateProgress() {
        if (!audio || isDragging) return;
        const pct = (audio.currentTime / audio.duration) * 100 || 0;
        progressFill.style.width = `${Math.min(pct, 100)}%`;
        timeDisplay.textContent = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration || 0)}`;
    }

    function seek(e) {
        if (!audio) return;
        const rect = progressTrack.getBoundingClientRect();
        const pct = Math.min(Math.max((e.clientX - rect.left) / rect.width, 0), 1);
        const time = pct * audio.duration;
        audio.currentTime = time;
        progressFill.style.width = `${pct * 100}%`;
        timeDisplay.textContent = `${formatTime(time)} / ${formatTime(audio.duration || 0)}`;
    }

    function updateUI() {
        document.querySelectorAll('.track-card').forEach((el, idx) => {
            el.classList.toggle('active', idx === currentIndex && isPlaying);
            const btn = el.querySelector('.tplay');
            if (btn) {
                btn.textContent = (idx === currentIndex && isPlaying) ? '⏸' : '▶';
                btn.classList.toggle('playing', idx === currentIndex && isPlaying);
            }
        });
    }

    // ============================================================
    // 3. RENDER GRID
    // ============================================================
    function renderTracks() {
        grid.innerHTML = '';
        tracks.forEach((track, index) => {
            const card = document.createElement('div');
            card.className = 'track-card';
            card.innerHTML = `
                <div class="tname">${track.name}</div>
                <div class="tgenre">${track.genre} · ${track.mood}</div>
                <button class="tplay" data-index="${index}">▶</button>
            `;
            card.addEventListener('click', (e) => {
                if (e.target.tagName === 'BUTTON') return;
                loadTrack(index);
                setTimeout(() => togglePlay(), 100);
            });
            const btn = card.querySelector('.tplay');
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (currentIndex === index && isPlaying) {
                    togglePlay();
                } else {
                    loadTrack(index);
                    setTimeout(() => togglePlay(), 100);
                }
            });
            grid.appendChild(card);
        });
        trackCount.textContent = `${tracks.length} tracks`;
    }

    // ============================================================
    // 4. SPLASH → APP
    // ============================================================
    setTimeout(() => {
        document.getElementById('splash').classList.add('hidden');
        const app = document.getElementById('app');
        app.style.display = 'block';
        setTimeout(() => app.style.opacity = '1', 50);
        loadTrack(0);
    }, 1400);

    // ============================================================
    // 5. EVENTS
    // ============================================================
    playBtn.addEventListener('click', togglePlay);
    prevBtn.addEventListener('click', prevTrack);
    nextBtn.addEventListener('click', nextTrack);
    shuffleBtn.addEventListener('click', () => {
        shuffle = !shuffle;
        shuffleBtn.textContent = shuffle ? '🔁' : '🔀';
        shuffleBtn.style.background = shuffle ? '#222' : '#fff';
        shuffleBtn.style.color = shuffle ? '#fff' : '#222';
    });

    downloadBtn.addEventListener('click', () => {
        if (tracks[currentIndex]) window.open(tracks[currentIndex].url, '_blank');
    });

    document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
        if (e.code === 'ArrowRight') nextTrack();
        if (e.code === 'ArrowLeft') prevTrack();
    });

    progressTrack.addEventListener('mousedown', (e) => {
        isDragging = true;
        seek(e);
    });
    window.addEventListener('mousemove', (e) => {
        if (isDragging) seek(e);
    });
    window.addEventListener('mouseup', () => { isDragging = false; });

    renderTracks();
    console.log(`🎵 Dhalius 8-Bit Player — ${tracks.length} tracks.`);
</script>
</body>
</html>
