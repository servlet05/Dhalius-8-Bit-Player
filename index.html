<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dhalius · Control Room</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0f;
        }
        ::-webkit-scrollbar-thumb {
            background: #2a2a3a;
            border-radius: 4px;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 300px;
            min-width: 300px;
            background: #0f0f18;
            border-right: 1px solid #1a1a2a;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            transition: width 0.2s;
        }

        .sidebar-header {
            padding: 18px 20px;
            border-bottom: 1px solid #1a1a2a;
            flex-shrink: 0;
        }

        .sidebar-header h1 {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: #f0f0f0;
        }

        .sidebar-header h1 span {
            color: #6a6a8a;
            font-weight: 300;
        }

        .sidebar-header .sub {
            font-size: 0.65rem;
            color: #4a4a5a;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        .sidebar-search {
            padding: 12px 20px;
            flex-shrink: 0;
        }

        .sidebar-search input {
            width: 100%;
            background: #1a1a2a;
            border: 1px solid #2a2a3a;
            padding: 8px 14px;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 0.8rem;
            outline: none;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .sidebar-search input:focus {
            border-color: #5a5a8a;
            background: #1a1a2e;
        }
        .sidebar-search input::placeholder {
            color: #4a4a5a;
        }

        .sidebar-tracks {
            flex: 1;
            overflow-y: auto;
            padding: 4px 12px 20px;
        }

        .track-item {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.15s;
            gap: 10px;
            border-left: 2px solid transparent;
        }

        .track-item:hover {
            background: #1a1a2a;
        }
        .track-item.active {
            background: #1a1a2e;
            border-left-color: #7a7aaa;
        }

        .track-item .tnum {
            font-size: 0.6rem;
            color: #4a4a5a;
            min-width: 24px;
            font-weight: 600;
        }

        .track-item .tinfo {
            flex: 1;
            overflow: hidden;
        }

        .track-item .tinfo .tname {
            font-size: 0.78rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-item .tinfo .tmeta {
            font-size: 0.6rem;
            color: #5a5a6a;
        }

        .track-item .tbadge {
            font-size: 0.5rem;
            background: #1a1a2a;
            padding: 2px 8px;
            border-radius: 10px;
            color: #6a6a8a;
            letter-spacing: 0.5px;
            flex-shrink: 0;
        }

        .track-item .tplay-indicator {
            font-size: 0.7rem;
            color: #6a6a8a;
            width: 18px;
            text-align: center;
        }

        .track-item.active .tplay-indicator {
            color: #8a8aaa;
        }

        /* ===== MAIN ===== */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background: #0a0a0f;
        }

        .topbar {
            padding: 14px 28px;
            border-bottom: 1px solid #1a1a2a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .topbar .collection-badge {
            font-size: 0.7rem;
            color: #5a5a6a;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .topbar .track-counter {
            font-size: 0.7rem;
            color: #4a4a5a;
        }

        .mobile-toggle {
            display: none;
            background: none;
            border: none;
            color: #c0c0d0;
            font-size: 1.4rem;
            cursor: pointer;
            padding: 0 8px;
        }

        /* ===== VISOR ===== */
        .visor {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px 28px;
            overflow-y: auto;
            gap: 18px;
        }

        .visor .top-row {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            align-items: flex-start;
        }

        .visor .artwork {
            width: 160px;
            height: 160px;
            border-radius: 12px;
            background: #1a1a2a;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #3a3a4a;
            border: 1px solid #1a1a2a;
            overflow: hidden;
        }

        .visor .artwork img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .visor .artwork .fallback {
            font-size: 3rem;
            opacity: 0.3;
            user-select: none;
        }

        .visor .track-details {
            flex: 1;
            min-width: 200px;
        }

        .visor .track-details .title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #f0f0f0;
            margin-bottom: 2px;
        }

        .visor .track-details .subtitle {
            font-size: 0.85rem;
            color: #7a7a8a;
            margin-bottom: 10px;
        }

        .visor .track-details .spec-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 6px 18px;
            margin-top: 6px;
        }

        .visor .track-details .spec-grid .spec-item {
            font-size: 0.7rem;
            color: #8a8a9a;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #1a1a2a;
            padding: 4px 0;
        }

        .visor .track-details .spec-grid .spec-item .label {
            color: #5a5a6a;
        }
        .visor .track-details .spec-grid .spec-item .value {
            color: #d0d0e0;
            font-weight: 500;
        }

        /* ===== SPECTROGRAM ===== */
        .spectrogram-wrap {
            width: 100%;
            background: #0f0f18;
            border-radius: 12px;
            border: 1px solid #1a1a2a;
            overflow: hidden;
            margin-top: 4px;
        }

        .spectrogram-wrap .header {
            padding: 8px 16px;
            font-size: 0.6rem;
            color: #4a4a5a;
            letter-spacing: 1px;
            border-bottom: 1px solid #1a1a2a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .spectrogram-wrap .header .freq-label {
            display: flex;
            gap: 12px;
        }

        .spectrogram-wrap .spectrogram-image {
            width: 100%;
            max-height: 180px;
            object-fit: contain;
            background: #0a0a0f;
            display: block;
        }

        .spectrogram-wrap .no-spec {
            padding: 30px 20px;
            text-align: center;
            color: #3a3a4a;
            font-size: 0.8rem;
        }

        /* ===== VIDEO ZONE ===== */
        .video-zone {
            width: 100%;
            background: #0f0f18;
            border-radius: 12px;
            border: 1px solid #1a1a2a;
            overflow: hidden;
            margin-top: 4px;
            transition: border-color 0.3s;
        }

        .video-zone .header {
            padding: 8px 16px;
            font-size: 0.6rem;
            color: #4a4a5a;
            letter-spacing: 1px;
            border-bottom: 1px solid #1a1a2a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .video-zone .drop-area {
            padding: 20px;
            text-align: center;
            color: #4a4a5a;
            font-size: 0.8rem;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.2s;
            border: 2px dashed transparent;
            border-radius: 8px;
            margin: 8px;
        }

        .video-zone .drop-area.dragover {
            border-color: #5a5a8a;
            background: #1a1a2e;
        }

        .video-zone .drop-area .icon {
            font-size: 2rem;
            opacity: 0.4;
        }

        .video-zone .drop-area .hint {
            font-size: 0.7rem;
            color: #3a3a4a;
        }

        .video-zone .drop-area input[type="file"] {
            display: none;
        }

        .video-zone .video-wrapper {
            position: relative;
            width: 100%;
            background: #0a0a0f;
            display: none;
            aspect-ratio: 16/9;
            max-height: 320px;
        }

        .video-zone .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .video-zone .video-wrapper .overlay {
            position: absolute;
            bottom: 8px;
            right: 12px;
            font-size: 0.6rem;
            color: #4a4a5a;
            background: rgba(0,0,0,0.6);
            padding: 4px 10px;
            border-radius: 4px;
            pointer-events: none;
        }

        .video-zone .video-wrapper .remove-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0,0,0,0.7);
            border: none;
            color: #c0c0d0;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.65rem;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: 0.2s;
        }

        .video-zone .video-wrapper .remove-btn:hover {
            background: #ff3355;
            color: #fff;
        }

        /* ===== PLAYER CONTROLS ===== */
        .player-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 0;
            flex-wrap: wrap;
        }

        .player-controls button {
            background: none;
            border: 1px solid #2a2a3a;
            color: #c0c0d0;
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.15s;
            font-family: 'Inter', sans-serif;
            min-width: 44px;
        }

        .player-controls button:hover {
            background: #1a1a2a;
            border-color: #4a4a6a;
        }

        .player-controls button.primary {
            background: #3a3a5a;
            border-color: #4a4a6a;
            color: #f0f0f0;
            padding: 6px 28px;
        }

        .player-controls button.primary:hover {
            background: #5a5a8a;
        }

        .player-controls .time-display {
            font-size: 0.75rem;
            color: #6a6a7a;
            font-variant-numeric: tabular-nums;
            min-width: 100px;
        }

        .player-controls .progress-wrap {
            flex: 1;
            min-width: 100px;
            height: 4px;
            background: #1a1a2a;
            border-radius: 4px;
            cursor: pointer;
            position: relative;
        }

        .player-controls .progress-wrap .fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #5a5a8a, #8a8aaa);
            border-radius: 4px;
            transition: width 0.05s linear;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .sidebar {
                width: 220px;
                min-width: 220px;
            }
            .visor .top-row {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .visor .artwork {
                width: 120px;
                height: 120px;
            }
            .visor .track-details .spec-grid {
                grid-template-columns: 1fr;
            }
            .topbar {
                padding: 10px 16px;
                flex-wrap: wrap;
                gap: 4px;
            }
            .visor {
                padding: 12px 16px;
            }
            .player-controls {
                justify-content: center;
            }
            .video-zone .video-wrapper {
                max-height: 200px;
            }
        }

        @media (max-width: 480px) {
            .sidebar {
                width: 0;
                min-width: 0;
                border-right: none;
                overflow: hidden;
            }
            .sidebar.open {
                width: 280px;
                min-width: 280px;
                position: fixed;
                z-index: 100;
                background: #0f0f18;
                border-right: 1px solid #1a1a2a;
                height: 100vh;
            }
            .mobile-toggle {
                display: block !important;
            }
        }
    </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h1>DHALIUS <span>· CR</span></h1>
        <div class="sub">CONTROL ROOM · v2.0</div>
    </div>
    <div class="sidebar-search">
        <input type="text" id="searchInput" placeholder="🔍 search tracks..." />
    </div>
    <div class="sidebar-tracks" id="trackList"></div>
</div>

<!-- MAIN -->
<div class="main">
    <div class="topbar">
        <div style="display:flex;align-items:center;gap:12px;">
            <button class="mobile-toggle" id="mobileToggle">☰</button>
            <span class="collection-badge" id="collectionBadge">ALL TRACKS</span>
        </div>
        <span class="track-counter" id="trackCounter">0 tracks</span>
    </div>

    <div class="visor" id="visor">
        <!-- top row: artwork + details -->
        <div class="top-row">
            <div class="artwork" id="artwork">
                <span class="fallback">♫</span>
            </div>
            <div class="track-details">
                <div class="title" id="trackTitle">—</div>
                <div class="subtitle" id="trackSubtitle">select a track</div>
                <div class="spec-grid" id="specGrid"></div>
            </div>
        </div>

        <!-- player -->
        <div class="player-controls">
            <button id="prevBtn">◀</button>
            <button class="primary" id="playBtn">▶</button>
            <button id="nextBtn">▶</button>
            <button id="downloadBtn">⬇</button>
            <span class="time-display" id="timeDisplay">0:00 / 0:00</span>
            <div class="progress-wrap" id="progressWrap">
                <div class="fill" id="progressFill"></div>
            </div>
        </div>

        <!-- spectrogram -->
        <div class="spectrogram-wrap">
            <div class="header">
                <span>SPECTROGRAM</span>
                <span class="freq-label"><span>20 Hz</span><span>20 kHz</span></span>
            </div>
            <div id="spectrogramContainer">
                <div class="no-spec">select a track to view spectrogram</div>
            </div>
        </div>

        <!-- VIDEO DROP ZONE -->
        <div class="video-zone" id="videoZone">
            <div class="header">
                <span>🎬 VIDEO SYNC · drop your video here</span>
                <span>max 5 MB</span>
            </div>
            <div class="drop-area" id="dropArea">
                <div class="icon">📁</div>
                <span>Drop a video here or click to browse</span>
                <span class="hint">MP4, WebM, MOV · max 5MB</span>
                <input type="file" id="fileInput" accept="video/*" />
            </div>
            <div class="video-wrapper" id="videoWrapper">
                <video id="videoPlayer" controls></video>
                <div class="overlay" id="videoStatus">synced</div>
                <button class="remove-btn" id="removeVideoBtn">✕ remove</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ============================================================
    // 1. LOAD TRACKS FROM tracks.json
    // ============================================================
    let tracks = [];
    let currentIndex = 0;
    let audio = null;
    let isPlaying = false;
    let isDragging = false;
    let filteredTracks = [];
    let videoFile = null;
    let videoURL = null;

    // DOM
    const trackListEl = document.getElementById('trackList');
    const searchInput = document.getElementById('searchInput');
    const trackCounter = document.getElementById('trackCounter');
    const collectionBadge = document.getElementById('collectionBadge');
    const artwork = document.getElementById('artwork');
    const trackTitle = document.getElementById('trackTitle');
    const trackSubtitle = document.getElementById('trackSubtitle');
    const specGrid = document.getElementById('specGrid');
    const spectrogramContainer = document.getElementById('spectrogramContainer');
    const playBtn = document.getElementById('playBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const timeDisplay = document.getElementById('timeDisplay');
    const progressFill = document.getElementById('progressFill');
    const progressWrap = document.getElementById('progressWrap');
    const mobileToggle = document.getElementById('mobileToggle');
    const sidebar = document.getElementById('sidebar');

    // Video elements
    const dropArea = document.getElementById('dropArea');
    const fileInput = document.getElementById('fileInput');
    const videoWrapper = document.getElementById('videoWrapper');
    const videoPlayer = document.getElementById('videoPlayer');
    const removeVideoBtn = document.getElementById('removeVideoBtn');
    const videoStatus = document.getElementById('videoStatus');

    // ============================================================
    // 2. FORMAT HELPERS
    // ============================================================
    function formatTime(seconds) {
        if (isNaN(seconds) || seconds < 0) return '0:00';
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
    }

    // ============================================================
    // 3. LOAD TRACKS FROM JSON
    // ============================================================
    async function loadTracks() {
        try {
            const res = await fetch('tracks.json');
            if (!res.ok) throw new Error('Could not load tracks.json');
            tracks = await res.json();
            filteredTracks = [...tracks];
            renderSidebar(filteredTracks);
            trackCounter.textContent = `${filteredTracks.length} tracks`;
            collectionBadge.textContent = `ALL · ${filteredTracks.length} TRACKS`;
            if (tracks.length > 0) loadTrack(0);
        } catch (e) {
            console.error('Error loading tracks:', e);
            trackListEl.innerHTML = '<div style="padding:20px;color:#4a4a5a;font-size:0.8rem;">⚠️ Could not load tracks.json. Make sure the file is in the same folder.</div>';
        }
    }

    // ============================================================
    // 4. RENDER SIDEBAR
    // ============================================================
    function renderSidebar(list) {
        trackListEl.innerHTML = '';
        list.forEach((track, idx) => {
            const div = document.createElement('div');
            div.className = 'track-item' + (idx === currentIndex && tracks.indexOf(track) === currentIndex ? ' active' : '');
            const num = tracks.indexOf(track) + 1;
            div.innerHTML = `
                <span class="tnum">${num}</span>
                <div class="tinfo">
                    <div class="tname">${track.name}</div>
                    <div class="tmeta">${track.genre} · ${track.collection}</div>
                </div>
                <span class="tbadge">${track.duration || '--'}</span>
                <span class="tplay-indicator">${idx === currentIndex && isPlaying ? '▶' : ''}</span>
            `;
            div.addEventListener('click', () => {
                const realIdx = tracks.indexOf(track);
                if (realIdx > -1) loadTrack(realIdx);
                if (window.innerWidth <= 480) sidebar.classList.remove('open');
            });
            trackListEl.appendChild(div);
        });
        trackCounter.textContent = `${list.length} tracks`;
    }

    // ============================================================
    // 5. LOAD TRACK
    // ============================================================
    function loadTrack(index) {
        if (index < 0 || index >= tracks.length) return;
        currentIndex = index;
        const track = tracks[index];

        if (audio) {
            audio.pause();
            audio = null;
        }

        audio = new Audio(track.url);
        audio.addEventListener('timeupdate', updateProgress);
        audio.addEventListener('ended', () => { nextTrack(); });
        audio.addEventListener('loadedmetadata', () => {
            const dur = formatTime(audio.duration);
            timeDisplay.textContent = `0:00 / ${dur}`;
        });

        // Sync video if exists
        if (videoPlayer.src) {
            videoPlayer.currentTime = 0;
            if (isPlaying) videoPlayer.play();
        }

        // Update UI
        trackTitle.textContent = track.name;
        trackSubtitle.textContent = `${track.genre} · ${track.mood} · ${track.collection}`;

        const collectionImages = {
            'FREE_background_music_dhalius': 'https://archive.org/download/FREE_background_music_dhalius/__ia_thumb.jpg',
            'GoogleMusic': 'https://archive.org/download/GoogleMusic/__ia_thumb.jpg',
            'soundtrack_music_for_films_background': 'https://archive.org/download/soundtrack_music_for_films_background/__ia_thumb.jpg',
            '100_free_royalty': 'https://archive.org/download/100_free_royalty_background_music_tracks/__ia_thumb.jpg',
            'music-made-by-artificial-intelligence': 'https://archive.org/download/music-made-by-artificial-intelligence/__ia_thumb.jpg'
        };
        const imgUrl = collectionImages[track.collection] || collectionImages['FREE_background_music_dhalius'];
        artwork.innerHTML = `<img src="${imgUrl}" alt="${track.name}" onerror="this.style.display='none';this.parentElement.innerHTML='<span class=\\'fallback\\'>♫</span>'" />`;

        specGrid.innerHTML = `
            <div class="spec-item"><span class="label">Duration</span><span class="value">${track.duration || '—'}</span></div>
            <div class="spec-item"><span class="label">Size</span><span class="value">${track.size || '—'}</span></div>
            <div class="spec-item"><span class="label">Genre</span><span class="value">${track.genre}</span></div>
            <div class="spec-item"><span class="label">Mood</span><span class="value">${track.mood}</span></div>
            <div class="spec-item"><span class="label">Collection</span><span class="value">${track.collection}</span></div>
            <div class="spec-item"><span class="label">Format</span><span class="value">MP3</span></div>
        `;

        if (track.spec) {
            spectrogramContainer.innerHTML = `
                <img class="spectrogram-image" src="${track.spec}" alt="Spectrogram" onerror="this.parentElement.innerHTML='<div class=\\'no-spec\\'>spectrogram not available</div>'" />
            `;
        } else {
            spectrogramContainer.innerHTML = `<div class="no-spec">spectrogram not available</div>`;
        }

        progressFill.style.width = '0%';
        timeDisplay.textContent = `0:00 / ${track.duration || '0:00'}`;
        isPlaying = false;
        playBtn.textContent = '▶';

        document.querySelectorAll('.track-item').forEach((el, idx) => {
            const isActive = idx === currentIndex;
            el.classList.toggle('active', isActive);
            const indicator = el.querySelector('.tplay-indicator');
            if (indicator) indicator.textContent = isActive && isPlaying ? '▶' : '';
        });

        const activeEl = document.querySelector('.track-item.active');
        if (activeEl) activeEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }

    // ============================================================
    // 6. PLAYER CONTROLS
    // ============================================================
    function togglePlay() {
        if (!audio) {
            loadTrack(currentIndex);
            setTimeout(() => togglePlay(), 200);
            return;
        }
        if (isPlaying) {
            audio.pause();
            isPlaying = false;
            playBtn.textContent = '▶';
            if (videoPlayer.src && !videoPlayer.paused) videoPlayer.pause();
        } else {
            audio.play().catch(() => {});
            isPlaying = true;
            playBtn.textContent = '⏸';
            if (videoPlayer.src && videoPlayer.paused) {
                if (videoPlayer.currentTime === 0 || videoPlayer.currentTime === videoPlayer.duration) {
                    videoPlayer.currentTime = 0;
                }
                videoPlayer.play().catch(() => {});
                videoStatus.textContent = 'synced';
            }
        }
        updatePlayIndicator();
    }

    function prevTrack() {
        const idx = (currentIndex - 1 + tracks.length) % tracks.length;
        loadTrack(idx);
        if (isPlaying) audio?.play().catch(() => {});
    }

    function nextTrack() {
        const idx = (currentIndex + 1) % tracks.length;
        loadTrack(idx);
        if (isPlaying) audio?.play().catch(() => {});
    }

    function updateProgress() {
        if (!audio || isDragging) return;
        const pct = (audio.currentTime / audio.duration) * 100 || 0;
        progressFill.style.width = `${Math.min(pct, 100)}%`;
        timeDisplay.textContent = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration || 0)}`;
        if (videoPlayer.src && isPlaying) {
            const diff = Math.abs(videoPlayer.currentTime - audio.currentTime);
            if (diff > 0.3) {
                videoPlayer.currentTime = audio.currentTime;
            }
        }
    }

    function updatePlayIndicator() {
        document.querySelectorAll('.track-item').forEach((el, idx) => {
            const indicator = el.querySelector('.tplay-indicator');
            if (indicator) indicator.textContent = idx === currentIndex && isPlaying ? '▶' : '';
        });
    }

    // ============================================================
    // 7. SEARCH
    // ============================================================
    searchInput.addEventListener('input', () => {
        const q = searchInput.value.toLowerCase().trim();
        filteredTracks = tracks.filter(t =>
            t.name.toLowerCase().includes(q) ||
            t.genre.toLowerCase().includes(q) ||
            t.mood.toLowerCase().includes(q) ||
            t.collection.toLowerCase().includes(q)
        );
        renderSidebar(filteredTracks);
        if (filteredTracks.length > 0 && !filteredTracks.includes(tracks[currentIndex])) {
            const newIdx = tracks.indexOf(filteredTracks[0]);
            if (newIdx > -1) loadTrack(newIdx);
        }
    });

    // ============================================================
    // 8. VIDEO DROP ZONE
    // ============================================================
    dropArea.addEventListener('click', () => fileInput.click());

    dropArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropArea.classList.add('dragover');
    });

    dropArea.addEventListener('dragleave', () => {
        dropArea.classList.remove('dragover');
    });

    dropArea.addEventListener('drop', (e) => {
        e.preventDefault();
        dropArea.classList.remove('dragover');
        const files = e.dataTransfer.files;
        if (files.length > 0) handleVideoFile(files[0]);
    });

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) handleVideoFile(e.target.files[0]);
    });

    function handleVideoFile(file) {
        if (file.size > 5 * 1024 * 1024) {
            alert('Video file is too large. Max size is 5 MB.');
            return;
        }
        if (!file.type.startsWith('video/')) {
            alert('Please select a video file (MP4, WebM, MOV).');
            return;
        }

        if (videoURL) URL.revokeObjectURL(videoURL);
        videoURL = URL.createObjectURL(file);
        videoPlayer.src = videoURL;
        videoPlayer.load();
        videoWrapper.style.display = 'block';
        dropArea.style.display = 'none';
        videoStatus.textContent = 'synced';

        // If audio is playing, start video
        if (isPlaying && audio) {
            videoPlayer.currentTime = audio.currentTime;
            videoPlayer.play().catch(() => {});
        }
    }

    removeVideoBtn.addEventListener('click', () => {
        if (videoURL) {
            URL.revokeObjectURL(videoURL);
            videoURL = null;
        }
        videoPlayer.src = '';
        videoPlayer.load();
        videoWrapper.style.display = 'none';
        dropArea.style.display = 'flex';
    });

    // Sync video when seeking
    videoPlayer.addEventListener('seeked', () => {
        if (audio && isPlaying) {
            audio.currentTime = videoPlayer.currentTime;
        }
    });

    // ============================================================
    // 9. EVENTS
    // ============================================================
    playBtn.addEventListener('click', togglePlay);
    prevBtn.addEventListener('click', prevTrack);
    nextBtn.addEventListener('click', nextTrack);
    downloadBtn.addEventListener('click', () => {
        if (tracks[currentIndex]) window.open(tracks[currentIndex].url, '_blank');
    });

    document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT') return;
        if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
        if (e.code === 'ArrowRight') nextTrack();
        if (e.code === 'ArrowLeft') prevTrack();
    });

    progressWrap.addEventListener('mousedown', (e) => {
        if (!audio) return;
        isDragging = true;
        const rect = progressWrap.getBoundingClientRect();
        const pct = Math.min(Math.max((e.clientX - rect.left) / rect.width, 0), 1);
        const time = pct * audio.duration;
        audio.currentTime = time;
        progressFill.style.width = `${pct * 100}%`;
        timeDisplay.textContent = `${formatTime(time)} / ${formatTime(audio.duration || 0)}`;
        if (videoPlayer.src) videoPlayer.currentTime = time;
    });
    window.addEventListener('mousemove', (e) => {
        if (!isDragging || !audio) return;
        const rect = progressWrap.getBoundingClientRect();
        const pct = Math.min(Math.max((e.clientX - rect.left) / rect.width, 0), 1);
        const time = pct * audio.duration;
        audio.currentTime = time;
        progressFill.style.width = `${pct * 100}%`;
        timeDisplay.textContent = `${formatTime(time)} / ${formatTime(audio.duration || 0)}`;
        if (videoPlayer.src) videoPlayer.currentTime = time;
    });
    window.addEventListener('mouseup', () => { isDragging = false; });

    mobileToggle.addEventListener('click', () => {
        sidebar.classList.toggle('open');
    });

    document.addEventListener('click', (e) => {
        if (window.innerWidth <= 480) {
            if (!sidebar.contains(e.target) && e.target !== mobileToggle) {
                sidebar.classList.remove('open');
            }
        }
    });

    // ============================================================
    // 10. INIT
    // ============================================================
    loadTracks();

    console.log('🎛️ Dhalius Control Room v2.0 loaded — video sync ready.');
</script>
</body>
</html>
